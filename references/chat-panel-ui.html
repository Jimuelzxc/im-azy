<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-panel: #1e1e1e;
            --bg-header: #292929;
            --border-subtle: rgba(255, 255, 255, 0.04);
            --border-btn: rgba(255, 255, 255, 0.5);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.57);
            --accent-purple: #d07cf0;
            --accent-purple-dark: #b15fd0;
            --bg-icon-placeholder: #2c2c2c;
            --bg-btn-placeholder: #252525;
            --font-main: 'Roboto Mono', monospace;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* For preview contrast */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container Settings */
        .chat-panel {
            box-sizing: border-box;
            background: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            width: 100%;
            width: 320px; /* Sensible width for sidebar chat */
            height: 100vh;
            max-height: 600px; /* Constrained for preview purposes */
            border-radius: 8px; /* Added for aesthetic standalone preview */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: var(--font-main);
        }

        /* Header */
        .chat-header {
            background: var(--bg-header);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            flex-shrink: 0;
        }

        .chat-header h2 {
            color: var(--accent-purple);
            letter-spacing: -0.32px;
            font-size: 11px;
            font-weight: 400;
            margin: 0;
        }

        .close-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
        }

        .close-btn svg {
            width: 14px;
            height: 14px;
            stroke-width: 2;
            transition: opacity 0.2s;
        }

        .close-btn:hover {
            opacity: 0.7;
        }

        /* Content Area */
        .chat-content {
            flex-grow: 1;
            padding: 24px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .greeting-message {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 90%;
        }

        .greeting-icon {
            background: var(--bg-icon-placeholder);
            width: 34px;
            height: 34px;
            border-radius: 6px;
        }

        .greeting-text {
            color: var(--text-primary);
            letter-spacing: -0.32px;
            font-size: 11.5px;
            line-height: 1.5;
            margin: 0;
        }

        /* Suggestion Buttons */
        .suggestion-buttons {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
        }

        .suggestion-btn {
            background: transparent;
            border: 1px solid var(--border-btn);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            letter-spacing: -0.24px;
        }

        .suggestion-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-primary);
        }

        .suggestion-btn.placeholder {
            background: var(--bg-btn-placeholder);
            border: 1px solid transparent;
            height: 26px; /* Match standard button height visually */
            cursor: default;
        }

        .suggestion-btn.placeholder:hover {
            background: var(--bg-btn-placeholder);
            border-color: transparent;
        }

        .suggestion-btn.placeholder:nth-child(2) {
            width: 100px;
        }

        .suggestion-btn.placeholder:nth-child(3) {
            width: 120px;
        }

        /* Input Form */
        .chat-input-wrapper {
            padding: 16px;
            flex-shrink: 0;
        }

        .chat-input-form {
            box-sizing: border-box;
            border: 1px solid var(--border-btn);
            border-radius: 4px;
            background: var(--bg-panel);
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 8px 12px;
            transition: border-color 0.2s;
        }

        .chat-input-form:focus-within {
            border-color: var(--accent-purple);
        }

        .input-top-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-sparkle {
            color: var(--accent-purple-dark);
            font-size: 14px;
            font-weight: 700;
        }

        .chat-input-form input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 11px;
            flex-grow: 1;
            padding: 0;
            outline: none;
        }

        .chat-input-form input::placeholder {
            color: var(--text-secondary);
        }

        .input-bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .send-btn {
            background: none;
            border: none;
            color: var(--accent-purple-dark);
            font-family: var(--font-mono);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .send-btn:hover {
            color: var(--accent-purple);
        }

        .settings-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(208, 208, 208, 0.7);
        }

        .settings-btn svg {
            width: 14px;
            height: 14px;
            stroke-width: 1.5;
            transition: color 0.2s;
        }

        .settings-btn:hover {
            color: var(--text-primary);
        }

        /* Responsive Design tweaks */
        @media (max-width: 480px) {
            .chat-panel {
                width: 100%;
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                border: none;
            }
        }
    </style>
</head>
<body>

    <aside class="chat-panel" aria-label="AI Chat Panel">
        <!-- Header -->
        <header class="chat-header">
            <h2>Ask azy about this video.</h2>
            <button class="close-btn" aria-label="Close panel">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </header>

        <!-- Content Area -->
        <main class="chat-content">
            <div class="greeting-message">
                <div class="greeting-icon" aria-hidden="true"></div>
                <p class="greeting-text">Hello! Curious about what you're watching? I'm here to help.</p>
                
                <div class="suggestion-buttons">
                    <button class="suggestion-btn">summarize the video</button>
                    <!-- Empty buttons acting as skeleton loaders or placeholders -->
                    <button class="suggestion-btn placeholder" aria-hidden="true" disabled></button>
                    <button class="suggestion-btn placeholder" aria-hidden="true" disabled></button>
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <div class="chat-input-wrapper">
            <form class="chat-input-form" onsubmit="event.preventDefault();">
                <div class="input-top-row">
                    <span class="ai-sparkle" aria-hidden="true">*</span>
                    <input type="text" placeholder="ask a question..." aria-label="Ask a question" autocomplete="off" />
                </div>
                <div class="input-bottom-row">
                    <button type="submit" class="send-btn" aria-label="Send message">&gt;</button>
                    <button type="button" class="settings-btn" aria-label="Settings">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </aside>

</body>
</html>
